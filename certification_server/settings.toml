[runtime]
entity_type = "service"
service_name = "certification_server"
instance_id = "ef29f54b-11a8-4358-a812-fba710193d18"
run_mode = "development" # 可选值：no_auth、development
grpc_listen_host = "127.0.0.1"
grpc_listen_port = 50051

[auth]
secret_key_dir = "secret_keys"
active_key_id = "e52c4caf-d4bc-49b1-8f37-9ea71eff3134"

[mysql]
dsn = "project_user:YourUserPassword123!@tcp(127.0.0.1:3306)/bms_test?charset=utf8mb4&parseTime=true&loc=Local"
dsns = "project_user:YourUserPassword123!@tcp(127.0.0.1:3306)/bms_test?charset=utf8mb4&parseTime=true&loc=Local"
max_open_conns = 8
max_idle_conns = 4
conn_max_lifetime = "30m"
conn_max_idle_time = "10m"
op_timeout = "3s"
circuit_breaker_failure_threshold = 5
circuit_breaker_recovery_timeout = "10s"
circuit_breaker_half_open_max_calls = 1

[redis]
mode = "cluster"
addrs = "127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003,127.0.0.1:7004,127.0.0.1:7005,127.0.0.1:7006"
password = "YourRedisPassword123!"
db = 0
max_retries = 3
pool_size = 10
min_idle_conns = 2
dial_timeout = "2s"
read_timeout = "2s"
write_timeout = "2s"
read_only = false
route_by_latency = false
route_randomly = false
op_timeout = "3s"
default_ttl = "24h"
circuit_breaker_failure_threshold = 5
circuit_breaker_recovery_timeout = "10s"
circuit_breaker_half_open_max_calls = 1

[etcd]
endpoints = "127.0.0.1:23791,127.0.0.1:23811,127.0.0.1:23813"
username = "root"
password = "YourEtcdPassword123!"
dial_timeout = "5s"
# auto_sync_interval = "0s" 宿主机无法解析 Docker 内部 DNS（etcd-1/2/3），禁用自动同步以避免端点污染
op_timeout = "3s"
circuit_breaker_failure_threshold = 5
circuit_breaker_recovery_timeout = "10s"
circuit_breaker_half_open_max_calls = 1

[auth_control]
enabled = true
rule_id = "certification_server_local"
scope = "auth"
subject = "composite"
algorithm = "fixed_window"
limit = 600
burst = 0
window_sec = 60
require_authenticated = false
match_module = "certification_server"
match_methods = "POST"