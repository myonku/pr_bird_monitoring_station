[pipeline]
# 运行时需通过 --task + --tier 指定本次任务。
output_root = "output_models"
logs_root = "logs"

[training]
# 训练相关的通用配置
seed = 42
epochs = 50
batch_size = 16
image_size = 640
learning_rate = 0.001
weight_decay = 0.0001
num_workers = 4
amp = true
early_stop_patience = 20

[detection_dataset]
# 检测训练数据集的具体配置
dataset_id = "det_source_public"
root = "E:/det_bird"
task = "detection"
label_policy = "single_class_bird"
notes = "Converted CUB unified detection layout (images/labels/annotations/yolo.yaml), all boxes mapped to bird"

[classification_dataset]
# 分类训练数据集的具体配置
dataset_id = "cls_cropped_species"
root = "E:/classification_cropped"
task = "classification"
label_policy = "species_classification"
notes = "Detector-cropped images with species labels"

[crop_generation]
# 是否启用基于检测结果的裁剪生成，用于分类训练数据的准备，以及相关的配置参数
enabled = true
framework = "yolo"
detector_model_path = "output_models/detection_lite/latest_detection_lightweight_edge_yolo_n.onnx"
source_root = "E:/photos"
output_root = "E:/classification_cropped"
score_threshold = 0.25
max_crops_per_image = 1

# 模型候选项的配置，定义了不同模型候选项的框架、模型名称、所属层级、任务类型、导出格式以及训练参数等信息
# 配置可超过四个候选，但必须覆盖四类组合：
# detection/lightweight, detection/standard, classification/lightweight, classification/standard
# run 命令会根据 --task + --tier，在匹配的候选中选择配置顺序最靠前的一个执行

## tier = lightweight | task = detection 的候选项
[[candidates]]
candidate_id = "edge_frcnn_mbv3_det"
framework = "pytorch"
model_name = "fasterrcnn_mobilenet_v3_large_320_fpn"
tier = "lightweight"
task = "detection"
export_formats = ["onnx"]

[candidates.train_params]
epochs = 2
batch_size = 4
image_size = 640
learning_rate = 0.001
pretrained = true


[[candidates]]
candidate_id = "edge_yolo_n"
framework = "yolo"
model_name = "yolo11n"
tier = "lightweight"
task = "detection"
export_formats = ["onnx"]

[candidates.train_params]
epochs = 2
imgsz = 640
pretrained = "weights/yolo11n.pt"

