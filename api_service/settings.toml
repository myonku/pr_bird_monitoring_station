[internal_assertion]
enabled = false
required = false
header_name = "x-internal-assertion"
clock_skew_sec = 30
replay_ttl_sec = 15
enforce_path_binding = false

[runtime]
entity_type = "service"
entity_id = "api_service"
entity_name = "api_service"

[auth]
secret_key_dir = "secret_keys"
active_key_id = "api-local-key"

[redis]
mode = "single"
dialect = "redis"
# host = "127.0.0.1"
# port = 6379
database = 0
# password = ""
