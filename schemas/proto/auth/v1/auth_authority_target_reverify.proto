syntax = "proto3";

package bms.auth.v1;

import "auth/v1/auth_authority_bootstrap.proto";
import "auth/v1/auth_authority_remote_auth.proto";

option go_package = "pr_bird_monitoring_station/schemas/proto/auth/v1;authv1";

// AuthAuthorityTargetReverifyService handles auth.target.reverify.forwarded_context.
service AuthAuthorityTargetReverifyService {
  // auth.target.reverify.forwarded_context -> ReverifyForwardedContext.
  rpc ReverifyForwardedContext(ForwardedAuthContext) returns (ForwardedAuthVerificationResult);
}

message ForwardedAuthContext {
  string principal_id = 1;
  string session_id = 2;
  string token_id = 3;

  string source_service = 4;
  string target_service = 5;
  reserved 6;
  reserved "binding_type";

  string gateway_id = 7;
  string verify_mode = 8;

  int64 grant_issued_at_ms = 9;
  int64 grant_expires_at_ms = 10;

  string trace_id = 11;
  string request_id = 12;
}

message ForwardedAuthVerificationResult {
  bool allowed = 1;
  IdentityContext identity = 2;
  Session session = 3;
  string failure_reason = 4;
}
