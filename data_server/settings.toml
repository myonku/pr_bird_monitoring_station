[runtime]
entity_type = "service"
service_name = "data_server"
instance_id = "d07e348-c73d-4497-b238-28d586deeab7"
run_mode = "no_auth"
grpc_listen_host = "127.0.0.1"
grpc_listen_port = 50053

[auth]
secret_key_dir = "secret_keys"
active_key_id = "3b385136-d4da-418d-b92c-c4e226abf3e5"

[mysql]
DIALECT = "mysql"
HOST = "127.0.0.1"
PORT = 3306
USER = "project_user"
PASSWORD = "YourUserPassword123!"
DATABASE = "bms_test"

[mysql.CIRCUITBREAKER]
failure_threshold = 5
recovery_timeout = 10.0
half_open_max_calls = 1

[redis]
MODE = "cluster"
DIALECT = "redis"
HOSTS = ["127.0.0.1:7001", "127.0.0.1:7002", "127.0.0.1:7003", "127.0.0.1:7004", "127.0.0.1:7005", "127.0.0.1:7006"]
PASSWORD = "YourRedisPassword123!"
DATABASE = 0

[redis.CIRCUITBREAKER]
failure_threshold = 5
recovery_timeout = 10.0
half_open_max_calls = 1

[mongo]
DIALECT = "mongodb"
HOST = "127.0.0.1"
PORT = 27017
USER = "mongoadmin"
PASSWORD = "YourMongoPassword123!"
DATABASE = "bms_test"
AUTHSOURCE = "admin"
DIRECTCONNECTION = true
TLS = false

[mongo.CIRCUITBREAKER]
failure_threshold = 5
recovery_timeout = 10.0
half_open_max_calls = 1

[etcd]
HOSTS = ["127.0.0.1:23791", "127.0.0.1:23811", "127.0.0.1:23813"]
USERNAME = "root"
PASSWORD = "YourEtcdPassword123!"
NAMESPACE = "/bms"

[etcd.CIRCUITBREAKER]
failure_threshold = 5
recovery_timeout = 10.0
half_open_max_calls = 1
