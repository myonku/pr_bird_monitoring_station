[runtime]
device_id = "6a9d6b92-fe06-44ee-a607-7284e783f738"
# 可选：设备展示名；留空时默认 unknown
device_name = "测试设备A"
# 可选：站点/位置展示名；留空时默认 unknown
location_name = "测试 Location A"
# development: 边缘端基础功能测试（禁用认证与外发）
# no_auth: 无认证联调模式（允许正常上传与补传，但认证流程不执行，认证头字段为空）
# full_development: 全面开发模式（启用认证与真实业务流程；此模式不要求配置 TLS）
run_mode = "no_auth"
spool_db_path = "data/edge_spool.sqlite3"
sync_interval_sec = 3.0
sync_batch_size = 20

[auth]
secret_key_dir = "secret_keys"
# 可选：为空时由后端按 runtime.device_id 回查公钥，边缘端从 secret_key_dir 自动解析本地密钥对
active_key_id = "626efa4f-0cd0-4e81-af6e-447b41bac8fc"
auth_state_db_path = "data/edge_auth.sqlite3"

[capture]
# mock: 本地联调；pir: 树莓派 PIR 触发 + 相机抓拍
mode = "mock"
# 使用 BCM GPIO 编号；默认 17 （即 GPIO17）
# PIR 输出建议接 3.3V 逻辑输入，和树莓派共地
pir_gpio_pin = 17
pir_wait_timeout_sec = 10.0
capture_cooldown_sec = 0.1
# 窗口限频：每 10 秒最多放行 3 次抓拍（设为 0 表示关闭）
capture_rate_window_sec = 10.0
capture_rate_max_images = 3
image_format = "jpg"
image_width = 1920
image_height = 1080

[upload_http]
base_backend_url = "http://127.0.0.1:8080"
upload_path = "/v1/edge/events"
auth_path = "/v1/edge/auth"
healthcheck_path = "/health"
timeout_sec = 3.0

[decision_policy]
enable_local_inference = true
confidence_threshold = 0.60
high_load_skip_inference = false
cpu_high_watermark = 0.85
memory_high_watermark = 0.90

[runtime_log]
enabled = true
include_timestamp = true
# 可选: startup,capture,decision,inference,delivery,sync,auth,all
stages = ["startup", "capture", "decision", "inference", "delivery", "sync", "auth"]

[model_pack]
# 边缘端本地模型目录；每个 task 子目录内必须且仅保留一个模型文件。
root_dir = "model_pack"
detection_dir = "model_pack/detection"
classification_dir = "model_pack/classification"
# 标签文件路径与名称（用于构建 id-name 字典）
label_dir = "model_pack"
detection_label_file_name = ""
classification_label_file_name = "labels.txt"

# lightweight 候选模型映射（按文件名命中）

[[model_pack_lightweight_candidates]]
candidate_id = "edge_frcnn_mbv3_det"
file_name = "detection_lightweight_edge_frcnn_mbv3_det.pth"
task = "detection"
framework = "pytorch"
model_name = "fasterrcnn_mobilenet_v3_large_320_fpn"
format = "custom"
input_size = [640, 640]
score_threshold = 0.25
nms_iou_threshold = 0.45
topk = 1

