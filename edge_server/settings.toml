[runtime]
device_id = "edge_device_001"
spool_db_path = "data/edge_spool.sqlite3"
sync_interval_sec = 3.0
sync_batch_size = 20

[auth]
secret_key_dir = "secret_keys"
active_key_id = ""
auth_state_db_path = "data/edge_auth.sqlite3"

[capture]
# mock: 本地联调；pir: 树莓派 PIR 触发 + 相机抓拍
mode = "mock"
pir_gpio_pin = 17
pir_wait_timeout_sec = 10.0
capture_cooldown_sec = 0.1
image_format = "jpg"
image_width = 1920
image_height = 1080

[upload_http]
upload_url = "http://127.0.0.1:8080/v1/edge/events"
healthcheck_url = "http://127.0.0.1:8080/health"
timeout_sec = 3.0
auth_token = ""

[decision_policy]
enable_local_inference = true
confidence_threshold = 0.60
high_load_skip_inference = false
cpu_high_watermark = 0.85
memory_high_watermark = 0.90

[model_pack]
# 边缘端本地模型目录；每个 task 子目录内必须且仅保留一个模型文件。
root_dir = "model_pack"
detection_dir = "model_pack/detection"
classification_dir = "model_pack/classification"
# 标签文件路径与名称（用于构建 id-name 字典）
label_dir = "model_pack"
detection_label_file_name = ""
classification_label_file_name = "labels.txt"

# lightweight 候选模型映射（按文件名命中）

[[model_pack_lightweight_candidates]]
candidate_id = "edge_frcnn_mbv3_det"
file_name = "detection_lightweight_edge_frcnn_mbv3_det.pth"
task = "detection"
framework = "pytorch"
model_name = "fasterrcnn_mobilenet_v3_large_320_fpn"
format = "custom"
input_size = [640, 640]
score_threshold = 0.25
nms_iou_threshold = 0.45
topk = 1

[[model_pack_lightweight_candidates]]
candidate_id = "edge_yolo_n"
file_name = "detection_lightweight_edge_yolo_n.onnx"
task = "detection"
framework = "yolo"
model_name = "yolo11n"
format = "onnx"
input_size = [640, 640]
score_threshold = 0.25
nms_iou_threshold = 0.45
topk = 1

[[model_pack_lightweight_candidates]]
candidate_id = "edge_mobilenet_cls"
file_name = "classification_lightweight_edge_mobilenet_cls.pth"
task = "classification"
framework = "pytorch"
model_name = "mobilenet_v3_large"
format = "custom"
input_size = [224, 224]
score_threshold = 0.0
nms_iou_threshold = 0.0
topk = 5

[[model_pack_lightweight_candidates]]
candidate_id = "edge_yolo11n_cls"
file_name = "classification_lightweight_edge_yolo11n_cls.onnx"
task = "classification"
framework = "yolo"
model_name = "yolo11n-cls"
format = "onnx"
input_size = [224, 224]
score_threshold = 0.0
nms_iou_threshold = 0.0
topk = 5
