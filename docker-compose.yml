version: '3.8'

services:
  # ==========================================
  # MySQL 8.4 单例
  # ==========================================
  mysql:
    image: mysql:8.4
    container_name: mysql-standalone
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "YourRootPassword123!" # 连接MySQL 的 root 用户密码
      MYSQL_DATABASE: "bms_test" # 启动时自动创建的数据库名称
      MYSQL_USER: "project_user" # 连接MySQL 的普通用户
      MYSQL_PASSWORD: "YourUserPassword123!" # 连接MySQL 的普通用户密码
    ports:
      - "3306:3306"
    volumes:
      - D:/Docker/Volume/pr_bms/mysql:/var/lib/mysql # 可自定义义本地挂载目录
    networks:
      - project-network

  # ==========================================
  # MongoDB Atlas Local 8.0 单例
  # ==========================================
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: mongo-standalone
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: "mongoadmin" # 连接MongoDB 的管理员用户名
      MONGO_INITDB_ROOT_PASSWORD: "YourMongoPassword123!" # 连接MongoDB 的管理员密码
      MONGO_INITDB_DATABASE: "bms_test" # 启动时默认初始化的数据库名称
    ports:
      - "27017:27017"
    volumes:
      - D:/Docker/Volume/pr_bms/mongodb:/data/db # 可自定义义本地挂载目录
    networks:
      - project-network

  # ==========================================
  # Redis Cluster 8.6 (3主3从)
  # ==========================================
  redis-node-1: &redis-template
    image: redis:8.6
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:6379"
      - "17001:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-1:/data
    networks:
      - project-network

  redis-node-2:
    <<: *redis-template
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:6379"
      - "17002:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-2:/data
    networks:
      - project-network

  redis-node-3:
    <<: *redis-template
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:6379"
      - "17003:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-3:/data
    networks:
      - project-network

  redis-node-4:
    <<: *redis-template
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    ports:
      - "7004:6379"
      - "17004:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-4:/data
    networks:
      - project-network

  redis-node-5:
    <<: *redis-template
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
    ports:
      - "7005:6379"
      - "17005:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-5:/data
    networks:
      - project-network

  redis-node-6:
    <<: *redis-template
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --requirepass "YourRedisPassword123!"
      --masterauth "YourRedisPassword123!"
      --cluster-announce-ip host.docker.internal
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    ports:
      - "7006:6379"
      - "17006:16379"
    volumes:
      - D:/Docker/Volume/pr_bms/redis/node-6:/data
    networks:
      - project-network

  # 自动组建 Redis 集群的临时容器，在初始化后会自动退出
  redis-cluster-init:
    image: redis:8.6
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    networks:
      - project-network
    # 需要确保 -a 参数中的密码与上方 redis-template 中的 requirepass 和 masterauth 保持一致
    command: >
      sh -c "sleep 5 && echo 'yes' | redis-cli -a 'YourRedisPassword123!' --cluster create \
      host.docker.internal:7001 host.docker.internal:7002 host.docker.internal:7003 \
      host.docker.internal:7004 host.docker.internal:7005 host.docker.internal:7006 \
      --cluster-replicas 1"

  # ==========================================
  # etcd 3.6.0-0 集群 (3节点)
  # ==========================================
  etcd-1:
    image: registry.k8s.io/etcd:3.6.0-0
    container_name: etcd-1
    command:
      - etcd
      - --name=etcd-1
      - --initial-advertise-peer-urls=http://etcd-1:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-1:2379
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-state=new
      - --data-dir=/etcd-data
    ports:
      - "23791:2379" # 更改为备用主机端口以避开宿主机 2379 访问受限情况
    volumes:
      - D:/Docker/Volume/pr_bms/etcd/node-1:/etcd-data
    networks:
      - project-network

  etcd-2:
    image: registry.k8s.io/etcd:3.6.0-0
    container_name: etcd-2
    command:
      - etcd
      - --name=etcd-2
      - --initial-advertise-peer-urls=http://etcd-2:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-2:2379
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-state=new
      - --data-dir=/etcd-data
    ports:
      - "23811:2379" # 映射到不同的宿主机端口防止冲突（已更改为备用端口）
    volumes:
      - D:/Docker/Volume/pr_bms/etcd/node-2:/etcd-data
    networks:
      - project-network

  etcd-3:
    image: registry.k8s.io/etcd:3.6.0-0
    container_name: etcd-3
    command:
      - etcd
      - --name=etcd-3
      - --initial-advertise-peer-urls=http://etcd-3:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd-3:2379
      - --initial-cluster-token=etcd-cluster-token
      - --initial-cluster=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - --initial-cluster-state=new
      - --data-dir=/etcd-data
    ports:
      - "23813:2379" # 更改为备用端口
    volumes:
      - D:/Docker/Volume/pr_bms/etcd/node-3:/etcd-data
    networks:
      - project-network

  # 自动初始化 etcd 用户和权限的临时容器，在初始化后会自动退出
  etcd-init-auth:
    image: registry.k8s.io/etcd:3.6.0-0
    container_name: etcd-init-auth
    depends_on:
      - etcd-1
      - etcd-2
      - etcd-3
    networks:
      - project-network
    environment:
      ETCDCTL_API: 3
    # 需要自定义设置 root 用户密码
    command: >
      sh -c "sleep 5 &&
      etcdctl --endpoints=http://etcd-1:2379 user add root:YourEtcdPassword123! --interactive=false &&
      etcdctl --endpoints=http://etcd-1:2379 auth enable"

networks:
  project-network:
    driver: bridge